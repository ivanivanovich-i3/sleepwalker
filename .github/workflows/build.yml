name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build Release
        run: dotnet build Sleepwalker.sln -c Release

      - name: Publish
        run: dotnet publish Sleepwalker.csproj -c Release -o publish

      - name: Create ZIP
        run: Compress-Archive -Path publish/* -DestinationPath Sleepwalker-latest.zip
        shell: pwsh

      - name: Delete Previous Latest Release
        continue-on-error: true
        run: gh release delete latest --yes
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Release
        uses: softprops/action-gh-release@v3
        with:
          files: Sleepwalker-latest.zip
          tag_name: latest
          draft: false
          prerelease: false
          token: ${{ secrets.GITHUB_TOKEN }}
