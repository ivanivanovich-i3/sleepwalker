name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v2

      - name: Restore NuGet packages
        run: nuget restore Sleepwalker.sln

      - name: Build Release
        run: msbuild Sleepwalker.sln /p:Configuration=Release /p:Platform=AnyCPU

      - name: Create ZIP
        run: |
          Compress-Archive -Path bin/Release/* -DestinationPath Sleepwalker-Release.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleepwalker-release
          path: Sleepwalker-Release.zip
