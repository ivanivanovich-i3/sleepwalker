name: Build and Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0'

      - name: Build Release
        run: dotnet build Sleepwalker.sln -c Release

      - name: Publish
        run: dotnet publish Sleepwalker.csproj -c Release -o publish

      - name: Create ZIP
        run: Compress-Archive -Path publish/* -DestinationPath Sleepwalker-Release.zip
        shell: pwsh

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: sleepwalker-release
          path: Sleepwalker-Release.zip
